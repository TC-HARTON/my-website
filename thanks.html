<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>送信完了 | HARTON</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#0ea5e9">
  <meta name="color-scheme" content="light">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./dist/output.css">
  <style>
    .fade-in { opacity: 0; transform: translateY(30px); transition: opacity 0.8s ease, transform 0.8s ease; }
    .fade-in.visible { opacity: 1; transform: translateY(0); }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border-width: 0;
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
      .fade-in { opacity: 1 !important; transform: none !important; }
    }
  </style>
  <noscript>
    <style>.fade-in { opacity: 1 !important; transform: none !important; }</style>
  </noscript>
</head>
<body class="font-sans text-dark-800 bg-white">

  <!-- ========== ヘッダー ========== -->
  <header class="fixed top-0 left-0 right-0 bg-white/80 backdrop-blur-md shadow-sm z-50" role="banner">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16 lg:h-20">
        <a href="/" class="flex items-center gap-3">
          <div class="w-9 h-9 bg-gradient-to-br from-sky-400 to-sky-600 rounded-lg flex items-center justify-center">
            <span class="text-white font-black text-lg font-display">H</span>
          </div>
          <span class="text-xl font-black bg-gradient-to-r from-sky-500 to-sky-700 bg-clip-text text-transparent font-display">HARTON</span>
        </a>
        <a href="/" class="bg-sky-500 text-white px-5 py-3 rounded-lg hover:bg-sky-600 transition font-bold text-sm">トップに戻る</a>
      </div>
    </div>
  </header>

  <main id="main" class="min-h-screen flex items-center justify-center bg-gradient-to-b from-dark-900 to-dark-800 pt-20">
    <div class="max-w-xl mx-auto px-4 text-center fade-in">
      <div class="bg-dark-800 rounded-2xl border border-dark-700 p-12 lg:p-16">
        <!-- チェックマークアイコン -->
        <div class="w-20 h-20 mx-auto mb-8 bg-sky-500/10 border-2 border-sky-500 rounded-full flex items-center justify-center">
          <svg class="w-10 h-10 text-sky-400" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
          </svg>
        </div>

        <h1 class="text-3xl lg:text-4xl font-black text-white mb-4">送信完了</h1>
        <p class="text-dark-400 leading-relaxed mb-8">
          お問い合わせありがとうございます。<br>
          内容を確認のうえ、<strong class="text-white">24時間以内</strong>にご連絡いたします。
        </p>

        <div class="space-y-4">
          <a href="/" class="inline-flex items-center justify-center gap-2 bg-sky-500 text-white font-bold px-8 py-4 rounded-xl text-lg hover:bg-sky-600 transition-all shadow-lg shadow-sky-500/25 w-full">
            トップページに戻る
          </a>
        </div>

        <p class="text-dark-500 text-xs mt-8" id="countdown">5秒後に自動でトップページへ移動します</p>
      </div>
    </div>
  </main>

  <!-- ========== フッター ========== -->
  <footer class="bg-dark-900 border-t border-dark-800 py-12" role="contentinfo">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex flex-col items-center gap-3">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 bg-gradient-to-br from-sky-400 to-sky-600 rounded-lg flex items-center justify-center">
            <span class="text-white font-black text-sm font-display">H</span>
          </div>
          <span class="text-white font-bold font-display">HARTON</span>
        </div>
        <p class="text-dark-500 text-xs">&copy; 2026 HARTON. All Rights Reserved.</p>
      </div>
    </div>
  </footer>

  <script>
    // Fade-in
    document.querySelectorAll('.fade-in').forEach(el => {
      el.classList.add('visible');
    });

    // Auto redirect
    let sec = 5;
    const cd = document.getElementById('countdown');
    const timer = setInterval(() => {
      sec--;
      if (sec <= 0) {
        clearInterval(timer);
        window.location.href = '/';
      } else {
        cd.textContent = sec + '秒後に自動でトップページへ移動します';
      }
    }, 1000);
  </script>
</body>
</html>
