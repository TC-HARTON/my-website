<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>送信完了 | HARTON</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#0ea5e9">
  <meta name="color-scheme" content="light">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./dist/output.css">
  <style>
    .fade-in { opacity: 0; transform: translateY(20px); transition: opacity 0.6s ease, transform 0.6s ease; }
    .fade-in.visible { opacity: 1; transform: translateY(0); }
    @keyframes check-draw {
      0% { stroke-dashoffset: 24; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes circle-scale {
      0% { transform: scale(0.8); opacity: 0; }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes glow-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(14, 165, 233, 0.3); }
      50% { box-shadow: 0 0 30px 10px rgba(14, 165, 233, 0.15); }
    }
    .check-icon { animation: circle-scale 0.5s ease-out forwards; }
    .check-icon svg path { stroke-dasharray: 24; stroke-dashoffset: 24; animation: check-draw 0.4s ease-out 0.4s forwards; }
    .glow { animation: glow-pulse 2.5s ease-in-out infinite; }
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border-width: 0;
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      .fade-in { opacity: 1 !important; transform: none !important; }
      .check-icon svg path { stroke-dashoffset: 0; }
    }
  </style>
  <noscript>
    <style>.fade-in { opacity: 1 !important; transform: none !important; }</style>
  </noscript>
</head>
<body class="font-sans text-dark-800 bg-dark-900">

  <!-- ========== ヘッダー（最小限） ========== -->
  <header class="fixed top-0 left-0 right-0 z-50" role="banner">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-center h-16 lg:h-20">
        <a href="/" class="flex items-center gap-3">
          <div class="w-9 h-9 bg-gradient-to-br from-sky-400 to-sky-600 rounded-lg flex items-center justify-center">
            <span class="text-white font-black text-lg font-display">H</span>
          </div>
          <span class="text-xl font-black bg-gradient-to-r from-sky-400 to-sky-600 bg-clip-text text-transparent font-display">HARTON</span>
        </a>
      </div>
    </div>
  </header>

  <main id="main" class="min-h-screen flex items-center justify-center pt-16 pb-24 px-4">
    <div class="max-w-md w-full text-center fade-in">

      <!-- チェックマーク -->
      <div class="check-icon glow w-24 h-24 mx-auto mb-10 bg-gradient-to-br from-sky-500/20 to-sky-400/10 border border-sky-500/30 rounded-full flex items-center justify-center">
        <svg class="w-12 h-12 text-sky-400" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
        </svg>
      </div>

      <!-- メッセージ -->
      <h1 class="text-4xl lg:text-5xl font-black text-white mb-5 tracking-tight">送信完了</h1>
      <p class="text-dark-400 text-base leading-relaxed mb-10">
        お問い合わせありがとうございます。<br>
        内容を確認のうえ、<strong class="text-sky-400 font-bold">24時間以内</strong>にご連絡いたします。
      </p>

      <!-- ボタン -->
      <a href="/" class="inline-flex items-center gap-2 bg-sky-500 text-white font-bold px-8 py-3.5 rounded-lg text-sm hover:bg-sky-600 transition-all shadow-lg shadow-sky-500/20">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
        </svg>
        トップページに戻る
      </a>

      <p class="text-dark-600 text-xs mt-6" id="countdown">5秒後に自動でトップページへ移動します</p>
    </div>
  </main>

  <!-- フッター（最小限） -->
  <footer class="absolute bottom-0 left-0 right-0 py-6" role="contentinfo">
    <p class="text-dark-600 text-xs text-center">&copy; 2026 HARTON. All Rights Reserved.</p>
  </footer>

  <script>
    document.querySelectorAll('.fade-in').forEach(el => el.classList.add('visible'));
    let sec = 5;
    const cd = document.getElementById('countdown');
    const timer = setInterval(() => {
      sec--;
      if (sec <= 0) { clearInterval(timer); window.location.href = '/'; }
      else { cd.textContent = sec + '秒後に自動でトップページへ移動します'; }
    }, 1000);
  </script>
</body>
</html>
