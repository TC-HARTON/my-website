<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="logo-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="0.8" fill="rgba(14,165,233,0.12)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Glows -->
  <circle cx="1050" cy="80" r="250" fill="#0ea5e9" opacity="0.08"/>
  <circle cx="150" cy="550" r="300" fill="#0ea5e9" opacity="0.05"/>
  <!-- Logo -->
  <rect x="490" y="140" width="52" height="52" rx="13" fill="url(#logo-g)"/>
  <text x="516" y="174" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-weight="900" font-size="26">H</text>
  <text x="600" y="178" text-anchor="start" fill="#fff" font-family="Arial,sans-serif" font-weight="900" font-size="38" letter-spacing="2">HARTON</text>
  <!-- Main copy -->
  <text x="600" y="290" text-anchor="middle" fill="#38bdf8" font-family="Arial,sans-serif" font-weight="900" font-size="54">モヤっと</text>
  <text x="600" y="290" text-anchor="middle" fill="#38bdf8" font-family="sans-serif" font-weight="900" font-size="54" opacity="0">モヤっと</text>
  <text x="600" y="355" text-anchor="middle" fill="#ffffff" font-family="Arial,sans-serif" font-weight="900" font-size="50">を可視化し、淀みない経営へ</text>
  <!-- Sub -->
  <text x="600" y="420" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-weight="400" font-size="22">WEB構築 / 業務自動化 / AI活用</text>
  <!-- Tags -->
  <rect x="310" y="460" width="140" height="42" rx="8" fill="none" stroke="#0ea5e9" stroke-width="1.5" opacity="0.5"/>
  <text x="380" y="487" text-anchor="middle" fill="#38bdf8" font-family="Arial,sans-serif" font-weight="700" font-size="16">WEB構築</text>
  <rect x="480" y="460" width="140" height="42" rx="8" fill="none" stroke="#0ea5e9" stroke-width="1.5" opacity="0.5"/>
  <text x="550" y="487" text-anchor="middle" fill="#38bdf8" font-family="Arial,sans-serif" font-weight="700" font-size="16">業務自動化</text>
  <rect x="650" y="460" width="160" height="42" rx="8" fill="none" stroke="#0ea5e9" stroke-width="1.5" opacity="0.5"/>
  <text x="730" y="487" text-anchor="middle" fill="#38bdf8" font-family="Arial,sans-serif" font-weight="700" font-size="16">AI売上予測</text>
  <!-- Bottom line -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#accent)"/>
</svg>
